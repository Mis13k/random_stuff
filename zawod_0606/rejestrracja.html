<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rejestracja</title>
    <link rel="stylesheet" href="styl.css" />
  </head>
  <body>
    <header>
      <h1>Formularz rejestracujny konferencji <em>Nasze Kwiaty</em></h1>
    </header>
    <main>
      <section class="blok">
        <h2>Dane osobowe</h2>
        <input type="text" placeholder="Wpisz imię" required />
        <input type="text" placeholder="Wpisz nazwisko" required />
        <button>Następna karta</button>
      </section>
      <section class="bloku">
        <h2>Dane kontaktowe</h2>
        <input type="email" placeholder="Twój e-mail" />
        <input type="tel" placeholder="Twój numer telefonu" />
        <button>Następna karta</button>
      </section>
      <section class="bloku">
        <h2>Hasło do logowania</h2>
        <input type="password" placeholder="Podaj hasło" />
        <input type="password" placeholder="Powtórz hasło" />
        <button>Zatwierdź</button>
      </section>
    </main>
    <footer>
      <section class="foot1">
        <video>
            <source src="motyl.mp4" type="video/mp4">
            Przeglądarka nie obsługuje tego formatu.
        </video>
    </section>
      <section class="foot2">
        <h3>Plan konferencji</h3>
        <table>
            <tr>
                <td>9:00 - 12:00</td>
                <td>Pielęgnacja roślin</td>
            </tr>
            <tr>
                <td>13:00 - 15:00</td>
                <td>Targi kwiatowe</td>
            </tr>
        </table>
      </section>
      <section class="foot3">
        <p><a href="https://kwiaty.pl/">Internetowa kwiaciarnia</a></p>
      </section>
      <section class="foot4">
        <p>Formularz wykonał: 000000000</p>
      </section>
    </footer>
  </body>
</html>
